name: Daily DB Update

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC chaque jour
  workflow_dispatch:        # déclenchement manuel possible

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update database (LEAGUE + DOMESTIC_CUP + EUROPE)
        run: |
          python - <<'EOF'
          import update_base
          update_base.ALLOWED_COMP_TYPES = {'LEAGUE', 'DOMESTIC_CUP', 'EUROPE'}
          update_base.main()
          EOF

      - name: Evaluate predictions
        run: python evaluate_predict_v1.py

      - name: Generate today's predictions
        run: python predict_toady_v2.py
